name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: pre-commit/action@v3.0.1

  build-linux:
    name: Linux ${{ matrix.compiler }} / ${{ matrix.config }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
            pkg: g++-12
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            pkg: g++-14
          - compiler: clang-16
            cc: clang-16
            cxx: clang++-16
            pkg: clang-16
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            pkg: clang-18
        config:
          - Release
          - RelWithDebInfo
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.pkg }}

      - name: Configure
        run: |
          cmake -G "Ninja Multi-Config" -B build \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror" \
            -DCMAKE_CXX_FLAGS_RELEASE="-g -DNDEBUG -O3" \
            -DCMAKE_CXX_FLAGS_RELWITHDEBINFO="-fsanitize=undefined -fsanitize=address -g -O3" \
            -DCMAKE_C_FLAGS_RELWITHDEBINFO="-fsanitize=undefined -fsanitize=address -g -O3" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -Dnlohmann_json_GIT_TAG=v3.10.0 \
            -Dnlohmann_json_FORCE_DOWNLOAD=ON \
            -Dnlohmann_json_schema_validator_FORCE_DOWNLOAD=ON \
            -Dnlohmann_json_schema_validator_GIT_TAG=2.4.0 \
            -DJSON_VALIDATOR_BUILD_TESTS=OFF \
            -DJSON_VALIDATOR_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

  build-wasm:
    name: WebAssembly (Emscripten)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Build Wasm module
        run: |
          emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release \
            -Djson_commander_BUILD_TESTING=OFF \
            -Djson_commander_BUILD_EXAMPLES=OFF \
            -Djson_commander_BUILD_TOOLS=OFF \
            -Djson_commander_BUILD_C_API=OFF
          cmake --build build-wasm

      - name: Copy Wasm artifacts
        run: |
          cp build-wasm/json_commander_wasm/json_commander_wasm.js \
             build-wasm/json_commander_wasm/json_commander_wasm.wasm \
             json_commander_wasm/npm/

      - name: Run smoke tests
        run: node json_commander_wasm/npm/test.mjs

      - name: Build native tool (for conformance tests)
        run: |
          cmake -G "Ninja Multi-Config" -B build-native \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -Djson_commander_BUILD_TESTING=OFF \
            -Djson_commander_BUILD_EXAMPLES=OFF \
            -Djson_commander_BUILD_C_API=OFF
          cmake --build build-native --config Release --target json-commander

      - name: Run conformance tests
        run: |
          JCMD_NATIVE=build-native/tools/Release/json-commander \
            node json_commander_wasm/npm/conformance.mjs

      - name: Report Wasm binary size
        run: |
          echo "Raw:    $(stat -c%s build-wasm/json_commander_wasm/json_commander_wasm.wasm) bytes"
          gzip -k build-wasm/json_commander_wasm/json_commander_wasm.wasm
          echo "Gzipped: $(stat -c%s build-wasm/json_commander_wasm/json_commander_wasm.wasm.gz) bytes"

  build-macos:
    name: macOS apple-clang / ${{ matrix.config }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        config:
          - Release
          - RelWithDebInfo
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: |
          cmake -G "Ninja Multi-Config" -B build \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -pedantic -Werror" \
            -DCMAKE_CXX_FLAGS_RELEASE="-g -DNDEBUG -O3" \
            -DCMAKE_CXX_FLAGS_RELWITHDEBINFO="-fsanitize=undefined -fsanitize=address -g -O3" \
            -DCMAKE_C_FLAGS_RELWITHDEBINFO="-fsanitize=undefined -fsanitize=address -g -O3" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -Dnlohmann_json_GIT_TAG=v3.10.0 \
            -Dnlohmann_json_FORCE_DOWNLOAD=ON \
            -Dnlohmann_json_schema_validator_FORCE_DOWNLOAD=ON \
            -Dnlohmann_json_schema_validator_GIT_TAG=2.4.0 \
            -DJSON_VALIDATOR_BUILD_TESTS=OFF \
            -DJSON_VALIDATOR_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure
